<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>선거법 AI</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060810;--bg2:#0a0e18;--surface:#0f1520;--surface2:#151d2e;
  --border:#1a2540;--border2:#1f2e4a;--text:#d8e8f8;--text2:#8aabcc;--text3:#5a7a9a;
  --gold:#d4a832;--gold2:#f0c84a;--blue:#3a8fd4;--green:#28c87a;--red:#f04060;
  --mono:'JetBrains Mono',monospace;--sans:'Noto Sans KR',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column}
header{background:linear-gradient(135deg,#0d1428 0%,#060810 100%);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-badge{background:linear-gradient(135deg,#1a2a50,#0d1830);border:1px solid var(--gold);border-radius:8px;padding:6px 12px;font-size:18px}
.logo-text h1{font-size:16px;font-weight:700;color:var(--gold2)}
.logo-text p{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:.8px}
.groq-key-wrap{display:flex;align-items:center;gap:8px}
.key-label{font-size:10px;color:var(--text3);font-family:var(--mono)}
.key-input{background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:5px 10px;font-family:var(--mono);font-size:11px;border-radius:6px;width:200px;outline:none}
.key-input:focus{border-color:var(--blue)}
.key-status{font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:4px}
.key-status.ok{color:var(--green);background:rgba(40,200,122,.1);border:1px solid rgba(40,200,122,.2)}
.key-status.no{color:var(--text3);background:var(--surface);border:1px solid var(--border)}
.law-tabs{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;padding:0 20px;gap:0}
.law-tab{padding:10px 20px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;color:var(--text3);transition:all .15s;white-space:nowrap}
.law-tab.active{color:var(--gold2);border-bottom-color:var(--gold2)}
.law-tab:hover:not(.active){color:var(--text)}
.chat-wrap{flex:1;display:flex;flex-direction:column;max-width:860px;width:100%;margin:0 auto;padding:0 16px}
.messages{flex:1;overflow-y:auto;padding:20px 0;display:flex;flex-direction:column;gap:16px;min-height:calc(100vh - 280px)}
.msg{display:flex;gap:10px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg.ai .msg-avatar{background:linear-gradient(135deg,#1a3060,#0d1830);border:1px solid var(--gold)}
.msg.user .msg-avatar{background:var(--surface2);border:1px solid var(--border2)}
.msg-content{max-width:75%;padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.8}
.msg.ai .msg-content{background:var(--surface);border:1px solid var(--border2);border-top-left-radius:3px}
.msg.user .msg-content{background:linear-gradient(135deg,#1a2a50,#0f1d3a);border:1px solid rgba(58,143,212,.3);border-top-right-radius:3px}
.msg-source{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.source-badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;background:rgba(58,143,212,.1);border:1px solid rgba(58,143,212,.2);color:var(--blue);margin-right:4px;margin-bottom:2px}
.quick-section{padding:12px 0}
.quick-label{font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:8px}
.quick-btns{display:flex;flex-wrap:wrap;gap:6px}
.quick-btn{font-size:11px;padding:5px 12px;border:1px solid var(--border2);border-radius:6px;cursor:pointer;color:var(--text2);background:var(--surface);transition:all .15s;white-space:nowrap}
.quick-btn:hover{border-color:var(--gold);color:var(--gold)}
.input-wrap{padding:16px 0;border-top:1px solid var(--border);background:var(--bg);position:sticky;bottom:0}
.input-row{display:flex;gap:8px}
.chat-input{flex:1;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:12px 16px;font-family:var(--sans);font-size:14px;border-radius:10px;outline:none;resize:none;height:48px;transition:border-color .2s}
.chat-input:focus{border-color:var(--blue)}
.chat-input::placeholder{color:var(--text3)}
.btn-send{background:linear-gradient(135deg,var(--blue),#1a60a0);color:white;border:none;padding:12px 20px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;transition:opacity .2s;white-space:nowrap}
.btn-send:hover{opacity:.85}
.btn-send:disabled{opacity:.4;cursor:not-allowed}
.info-card{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:20px;margin:8px 0}
.info-card h3{font-size:14px;color:var(--gold2);margin-bottom:10px}
.info-card p{font-size:13px;color:var(--text2);line-height:1.7}
.docs{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.doc-tag{font-size:11px;padding:3px 10px;border-radius:5px;background:rgba(58,143,212,.08);border:1px solid rgba(58,143,212,.2);color:var(--blue)}
.thinking{display:flex;align-items:center;gap:8px;color:var(--text3);font-size:13px;padding:4px 0}
.dot-anim{display:flex;gap:4px}
.dot-anim span{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:dot 1.2s infinite;opacity:.3}
.dot-anim span:nth-child(2){animation-delay:.2s}
.dot-anim span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,100%{opacity:.3}50%{opacity:1}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-badge">⚖</div>
    <div class="logo-text">
      <h1>선거법 AI</h1>
      <p>공직선거법 · 정치자금법 특화</p>
    </div>
  </div>
  <div class="groq-key-wrap">
    <span class="key-label">GROQ</span>
    <input class="key-input" id="groqKey" type="password" placeholder="gsk_xxxx" autocomplete="off">
    <span class="key-status no" id="keyStatus">미입력</span>
  </div>
</header>

<div class="law-tabs">
  <div class="law-tab active" onclick="setLaw('all',this)">전체</div>
  <div class="law-tab" onclick="setLaw('election',this)">공직선거법</div>
  <div class="law-tab" onclick="setLaw('fund',this)">정치자금법</div>
  <div class="law-tab" onclick="setLaw('cost',this)">선거비용</div>
</div>

<div class="chat-wrap">
  <div class="messages" id="messages">
    <div class="info-card">
      <h3>⚖ 공직선거법 · 정치자금법 전문 AI</h3>
      <p>아래 자료를 학습하여 답변합니다. 법령 해석, 선거비용 요건, 후원금 규정 등을 질문하세요.</p>
      <div class="docs">
        <span class="doc-tag">📋 공직선거법</span>
        <span class="doc-tag">💰 정치자금법</span>
        <span class="doc-tag">📋 정치자금사무관리규칙</span>
        <span class="doc-tag">📊 선거비용보전안내서</span>
        <span class="doc-tag">📖 정치자금회계실무</span>
      </div>
    </div>
    <div class="quick-section">
      <div class="quick-label">자주 묻는 질문</div>
      <div class="quick-btns">
        <button class="quick-btn" onclick="sendQ(this.textContent)">후원금 기부 한도액은?</button>
        <button class="quick-btn" onclick="sendQ(this.textContent)">선거비용 보전 요건은?</button>
        <button class="quick-btn" onclick="sendQ(this.textContent)">예비후보자 선거운동 범위는?</button>
        <button class="quick-btn" onclick="sendQ(this.textContent)">선거사무장 수당 기준은?</button>
        <button class="quick-btn" onclick="sendQ(this.textContent)">외국인 정치자금 기부 가능?</button>
        <button class="quick-btn" onclick="sendQ(this.textContent)">정치자금 회계보고 기한은?</button>
        <button class="quick-btn" onclick="sendQ(this.textContent)">SNS 선거운동 가능 시기는?</button>
        <button class="quick-btn" onclick="sendQ(this.textContent)">기탁금 반환 요건은?</button>
      </div>
    </div>
  </div>
  <div class="input-wrap">
    <div class="input-row">
      <textarea class="chat-input" id="chatInput" placeholder="공직선거법·정치자금법에 대해 질문하세요..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
      <button class="btn-send" id="sendBtn" onclick="send()">전송</button>
    </div>
  </div>
</div>

<script>
const KB = [
  {s:"정치자금법",t:"정치자금법 제1조~제11조 핵심\n제1조(목적): 정치자금의 적정한 제공 보장, 투명성 확보, 부정 방지\n제2조(기본원칙): 이 법에 의하지 않고는 정치자금 기부/수령 불가. 공명정대 운용, 회계 공개. 정치활동 경비로만 지출. 1회 120만원 초과 기부 시 실명확인 필수. 타인 명의/가명 기부 금지\n제6조(후원회지정권자): 중앙당, 국회의원, 지방의회의원, 대통령/국회의원/지방의원/지자체장 선거 후보자·예비후보자\n제11조(후원인 기부한도): 연간 2천만원 초과 불가. 대통령후보자 후원회: 1천만원. 국회의원 후원회: 500만원. 시도의회의원 후원회: 200만원. 자치구시군의회의원 후원회: 100만원. 1회 10만원/연간 120만원 이하 익명 기부 가능"},
  {s:"정치자금법",t:"정치자금법 기부 제한 및 벌칙\n제31조(기부의 제한): 외국인, 국내외 법인·단체는 정치자금 기부 불가. 법인·단체 관련 자금으로 기부 불가\n제32조(특정행위 관련 기부 제한): 공직선거 후보 추천, 공무원 청탁/알선, 국가/공공단체 계약과 관련한 기부 금지\n제45조(정치자금부정수수죄): 5년 이하 징역 또는 1천만원 이하 벌금. 법 외 방법으로 정치자금 기부/수령, 기부한도 초과, 외국인/법인 기부 위반 시 적용"},
  {s:"정치자금법",t:"정치자금법 후원회 모금한도 및 회계보고\n제12조(후원회 모금한도): 중앙당 50억원. 대통령후보자: 선거비용제한액의 5%. 국회의원: 1억5천만원. 지자체장: 선거비용제한액의 50%\n제40조(회계보고): 정당 회계책임자는 선거참여 않는 연도 다음해 2월15일까지 보고. 선거 참여 시 선거일 후 30일(대통령선거는 40일)까지 보고\n제44조(회계장부 보존): 회계보고 마친 날부터 3년간 보존 의무"},
  {s:"정치자금사무관리규칙",t:"정치자금사무관리규칙 핵심\n제6조(후원회 등록신청): 후원회 대표자는 지정받은 날부터 14일 이내 등록신청, 7일 이내 수리\n제15조(후원금 기부방법): 성명·생년월일·주소·직업·전화번호 알려야 함. 익명기부는 1회 10만원 이하\n제19조(후원금 모금 고지): 전화(자동송신장치 불가), 전자우편, 인터넷홈페이지, 안내장 발송 가능\n제21조(정치자금영수증): 기부받은 날부터 30일 이내 교부 필수. 중앙선관위 제작 정액/무정액영수증만 사용 가능"},
  {s:"공직선거법",t:"공직선거법 선거운동 관련 핵심\n제58조(정의): 선거운동이란 당선되거나 되게 하거나 되지 못하게 하기 위한 행위. 단순한 의견 개진·의사표시는 선거운동 아님\n제59조(선거운동기간): 선거운동은 후보자등록마감일의 다음날부터 선거일 전일까지. 예외: 인터넷 홈페이지, 문자메시지, 이메일은 상시 가능\n제60조(선거운동을 할 수 없는 자): 공무원, 각급 선관위 위원, 미성년자, 외국인 등"},
  {s:"공직선거법",t:"공직선거법 예비후보자 규정\n제60조의2(예비후보자등록): 대통령선거 240일 전, 국회의원선거 120일 전, 시도지사 120일 전, 기초단체장·지역구시도의원 60일 전, 지역구자치구시군의원 60일 전부터 등록 가능\n제60조의3(예비후보자 선거운동): 예비후보자는 선거사무소 설치, 명함 배부, 예비후보자공약집 발행, 어깨띠·표지물 사용, 전화·문자·이메일·SNS 가능. 선거운동원 이용 불가"},
  {s:"공직선거법",t:"공직선거법 선거비용 보전 핵심\n제122조의2(선거비용 보전): 대통령선거 15% 이상 득표 시 전액 보전, 10% 이상 15% 미만 반액 보전. 지역구국회의원선거/지자체장선거 15% 이상 득표 또는 당선 시 전액 보전, 10~15% 미만 반액 보전. 비례대표는 의석 있는 정당 전액 보전\n제122조(선거비용제한액 공고): 관할 선관위가 후보자등록신청개시일 전 공고"},
  {s:"공직선거법",t:"공직선거법 선거사무관계자 보상\n제135조(선거사무관계자 수당·실비): 선거사무장, 선거연락소장, 선거사무원, 활동보조인에게 수당·실비 지급 가능. 금액은 중앙선관위규칙으로 정함\n선거사무원 수: 읍면동 단위 선거구마다 선거사무장 1명, 선거사무원 정해진 수 이내\n제62조(선거운동기구): 후보자는 선거사무소 1개소 설치 가능. 선거운동원 수는 선거종류에 따라 제한"},
  {s:"공직선거법",t:"공직선거법 기탁금 관련\n제56조(기탁금): 후보자는 등록 시 선거종류별 기탁금 납부. 대통령선거 3억원, 국회의원 1500만원, 시도지사 5000만원, 교육감 3000만원, 시도의원 300만원, 자치구시군장 1000만원, 자치구시군의원 200만원\n제57조(기탁금 반환): 당선·사망 또는 유효투표 15% 이상 득표 시 전액 반환. 유효투표 10~15% 미만 득표 시 반액 반환"},
];

let currentLaw = 'all';

document.getElementById('groqKey').addEventListener('input', function() {
  const v = this.value.trim();
  const el = document.getElementById('keyStatus');
  if(v){ el.textContent='✓'; el.className='key-status ok'; localStorage.setItem('elaw_groq',v) }
  else { el.textContent='미입력'; el.className='key-status no' }
});
const saved = localStorage.getItem('elaw_groq');
if(saved){ document.getElementById('groqKey').value=saved; document.getElementById('keyStatus').textContent='✓'; document.getElementById('keyStatus').className='key-status ok' }

function setLaw(law, el) {
  currentLaw = law;
  document.querySelectorAll('.law-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
}

function searchKB(query, topK=6) {
  const words = (query.match(/[\w가-힣]{2,}/g)||[]);
  const filterMap = {election:'공직선거법', fund:'정치자금법', cost:'선거비용', all:null};
  const filter = filterMap[currentLaw];
  const scored = KB.map(chunk => {
    if(filter && !chunk.s.includes(filter) && !chunk.t.includes(filter)) return {score:-1,chunk};
    let score = 0;
    const text = chunk.t.toLowerCase();
    for(const w of words){
      const cnt = (text.match(new RegExp(w.toLowerCase(),'g'))||[]).length;
      score += cnt*(w.length>=4?2:1);
    }
    return {score,chunk};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,topK).map(x=>x.chunk);
  return scored;
}

async function callGroq(system, user) {
  const key = document.getElementById('groqKey').value.trim();
  if(!key) throw new Error('Groq API 키를 입력해주세요');
  const r = await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Authorization':`Bearer ${key}`,'Content-Type':'application/json'},
    body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'system',content:system},{role:'user',content:user}],max_tokens:2000,temperature:0.2})
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`Groq 오류 ${r.status}`)}
  return (await r.json()).choices[0].message.content;
}

function addMsg(role, html, sources=[]) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatar = role==='ai'?'⚖':'👤';
  const srcHtml = sources.length ? `<div class="msg-source">${[...new Set(sources)].map(s=>`<span class="source-badge">${s}</span>`).join('')}</div>` : '';
  div.innerHTML = `<div class="msg-avatar">${avatar}</div><div class="msg-content">${html}${srcHtml}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addLoading() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className='msg ai';div.id='lmsg';
  div.innerHTML='<div class="msg-avatar">⚖</div><div class="msg-content"><div class="thinking"><div class="dot-anim"><span></span><span></span><span></span></div>법령 검토 중...</div></div>';
  msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function sendQ(q){document.getElementById('chatInput').value=q;send()}

async function send() {
  const input=document.getElementById('chatInput');
  const q=input.value.trim();if(!q)return;
  const btn=document.getElementById('sendBtn');btn.disabled=true;input.value='';
  addMsg('user',esc(q));
  addLoading();
  try {
    const chunks=searchKB(q);
    const ctx=chunks.map(c=>`[출처: ${c.s}]\n${c.t}`).join('\n\n---\n\n');
    const sources=chunks.map(c=>c.s);
    const system=`당신은 대한민국 공직선거법과 정치자금법 전문 AI입니다.\n\n아래 법령 자료를 기반으로 정확하게 답변하세요:\n\n===법령 자료===\n${ctx||'(관련 자료 없음, AI 학습 데이터 기반 답변)'}\n================\n\n답변 원칙:\n1. 구체적인 조문(제X조)을 반드시 인용하세요\n2. 위반 시 벌칙/과태료가 있으면 명시하세요\n3. 예외나 주의사항은 반드시 언급하세요\n4. 불확실한 내용은 "선관위 유권해석 또는 전문가 상담 필요"라고 명시하세요\n5. 마지막에 면책문구를 추가하세요`;
    const answer=await callGroq(system,q);
    document.getElementById('lmsg')?.remove();
    const html=answer.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
    addMsg('ai',html,sources.length?sources:['AI 학습 데이터']);
  } catch(e) {
    document.getElementById('lmsg')?.remove();
    addMsg('ai',`<span style="color:var(--red)">❌ ${esc(e.message)}</span>`);
  }
  btn.disabled=false;input.focus();
}
